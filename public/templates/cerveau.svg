<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <!-- Niveau 1 : petit cerveau -->
  <rect x="0" y="0" width="600" height="150" fill="#2c3e50"/>
  <circle cx="80" cy="75" r="30" fill="#95a5a6"/>
  <path d="M60,75 Q70,55 80,60 Q90,50 95,65 Q105,55 100,75 Q105,90 90,85 Q80,95 70,85 Q55,90 60,75Z" fill="#bdc3c7"/>
  <rect x="140" y="40" width="420" height="70" rx="6" fill="rgba(0,0,0,0.3)"/>
  <text x="350" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#999">Niveau 1 - Basique</text>
  <text x="350" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#777">Votre texte ici</text>

  <!-- Ligne separatrice -->
  <line x1="0" y1="150" x2="600" y2="150" stroke="#444" stroke-width="1"/>

  <!-- Niveau 2 : cerveau moyen -->
  <rect x="0" y="150" width="600" height="150" fill="#34495e"/>
  <circle cx="80" cy="225" r="35" fill="#3498db" opacity="0.3"/>
  <path d="M55,225 Q65,200 80,207 Q95,193 100,213 Q115,200 108,225 Q115,245 95,238 Q80,252 65,238 Q48,248 55,225Z" fill="#5dade2"/>
  <!-- Petites etincelles -->
  <circle cx="60" cy="205" r="2" fill="#f1c40f"/>
  <circle cx="100" cy="210" r="2" fill="#f1c40f"/>
  <rect x="140" y="190" width="420" height="70" rx="6" fill="rgba(0,0,0,0.3)"/>
  <text x="350" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#aaa">Niveau 2 - Eclaire</text>
  <text x="350" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#888">Votre texte ici</text>

  <!-- Ligne separatrice -->
  <line x1="0" y1="300" x2="600" y2="300" stroke="#444" stroke-width="1"/>

  <!-- Niveau 3 : grand cerveau -->
  <rect x="0" y="300" width="600" height="150" fill="#1a2744"/>
  <circle cx="80" cy="375" r="40" fill="#8e44ad" opacity="0.3"/>
  <path d="M48,375 Q58,345 78,353 Q98,337 105,360 Q122,345 113,375 Q122,400 98,392 Q78,408 58,392 Q40,405 48,375Z" fill="#a569bd"/>
  <!-- Rayons -->
  <line x1="80" y1="330" x2="80" y2="318" stroke="#f39c12" stroke-width="2"/>
  <line x1="110" y1="345" x2="120" y2="335" stroke="#f39c12" stroke-width="2"/>
  <line x1="50" y1="345" x2="40" y2="335" stroke="#f39c12" stroke-width="2"/>
  <line x1="115" y1="375" x2="128" y2="375" stroke="#f39c12" stroke-width="2"/>
  <line x1="45" y1="375" x2="32" y2="375" stroke="#f39c12" stroke-width="2"/>
  <circle cx="65" cy="350" r="2" fill="#f1c40f"/>
  <circle cx="95" cy="355" r="2" fill="#f1c40f"/>
  <circle cx="75" cy="395" r="2" fill="#f1c40f"/>
  <rect x="140" y="340" width="420" height="70" rx="6" fill="rgba(0,0,0,0.3)"/>
  <text x="350" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ccc">Niveau 3 - Genie</text>
  <text x="350" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#aaa">Votre texte ici</text>

  <!-- Ligne separatrice -->
  <line x1="0" y1="450" x2="600" y2="450" stroke="#444" stroke-width="1"/>

  <!-- Niveau 4 : cerveau cosmique -->
  <rect x="0" y="450" width="600" height="150" fill="#0d1b2a"/>
  <!-- Halo cosmique -->
  <circle cx="80" cy="525" r="55" fill="#e74c3c" opacity="0.1"/>
  <circle cx="80" cy="525" r="45" fill="#9b59b6" opacity="0.15"/>
  <path d="M42,525 Q55,490 78,500 Q102,480 110,508 Q130,490 118,525 Q130,555 102,545 Q78,565 55,545 Q35,560 42,525Z" fill="#e74c3c"/>
  <!-- Rayons cosmiques -->
  <line x1="80" y1="465" x2="80" y2="448" stroke="#f1c40f" stroke-width="3"/>
  <line x1="120" y1="485" x2="135" y2="470" stroke="#f1c40f" stroke-width="3"/>
  <line x1="40" y1="485" x2="25" y2="470" stroke="#f1c40f" stroke-width="3"/>
  <line x1="135" y1="525" x2="150" y2="525" stroke="#f1c40f" stroke-width="3"/>
  <line x1="25" y1="525" x2="10" y2="525" stroke="#f1c40f" stroke-width="3"/>
  <line x1="120" y1="565" x2="135" y2="580" stroke="#f1c40f" stroke-width="3"/>
  <line x1="40" y1="565" x2="25" y2="580" stroke="#f1c40f" stroke-width="3"/>
  <!-- Etoiles -->
  <circle cx="50" cy="470" r="2" fill="white" opacity="0.8"/>
  <circle cx="110" cy="480" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="30" cy="560" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="130" cy="555" r="2" fill="white" opacity="0.5"/>
  <rect x="140" y="490" width="420" height="70" rx="6" fill="rgba(0,0,0,0.3)"/>
  <text x="350" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f1c40f">Niveau 4 - Cosmique</text>
  <text x="350" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ccc">Votre texte ici</text>

  <!-- Label du template -->
  <rect x="400" y="5" width="190" height="35" rx="6" fill="rgba(0,0,0,0.6)"/>
  <text x="495" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">CERVEAU MEME</text>
</svg>