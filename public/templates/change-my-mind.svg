<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <!-- Ciel -->
  <rect x="0" y="0" width="600" height="350" fill="#87CEEB"/>
  <!-- Nuages -->
  <ellipse cx="120" cy="80" rx="60" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="160" cy="75" rx="40" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="450" cy="120" rx="50" ry="20" fill="white" opacity="0.6"/>
  <ellipse cx="490" cy="115" rx="35" ry="16" fill="white" opacity="0.6"/>

  <!-- Sol / herbe -->
  <rect x="0" y="350" width="600" height="250" fill="#4CAF50"/>
  <rect x="0" y="350" width="600" height="15" fill="#66BB6A"/>

  <!-- Table -->
  <rect x="250" y="300" width="200" height="12" rx="2" fill="#8D6E63"/>
  <rect x="270" y="312" width="8" height="100" fill="#795548"/>
  <rect x="430" y="312" width="8" height="100" fill="#795548"/>
  <!-- Pieds de table barre -->
  <rect x="270" y="400" width="175" height="8" fill="#795548"/>

  <!-- Chaise -->
  <rect x="160" y="310" width="60" height="8" fill="#5D4037"/>
  <rect x="160" y="318" width="8" height="70" fill="#5D4037"/>
  <rect x="212" y="318" width="8" height="70" fill="#5D4037"/>
  <rect x="155" y="250" width="8" height="68" fill="#5D4037"/>

  <!-- Personnage (simplifie) -->
  <!-- Corps -->
  <rect x="170" y="260" width="50" height="60" rx="5" fill="#2196F3"/>
  <!-- Tete -->
  <circle cx="195" cy="240" r="25" fill="#FFCC80"/>
  <!-- Cheveux -->
  <path d="M172,230 Q180,210 195,215 Q210,210 218,230" fill="#5D4037" stroke="none"/>
  <!-- Visage -->
  <circle cx="188" cy="237" r="2.5" fill="#333"/>
  <circle cx="202" cy="237" r="2.5" fill="#333"/>
  <path d="M188,248 Q195,255 202,248" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Bras -->
  <line x1="220" y1="280" x2="260" y2="300" stroke="#FFCC80" stroke-width="8" stroke-linecap="round"/>
  <line x1="170" y1="280" x2="150" y2="310" stroke="#FFCC80" stroke-width="8" stroke-linecap="round"/>
  <!-- Jambes -->
  <line x1="185" y1="320" x2="175" y2="385" stroke="#1565C0" stroke-width="10" stroke-linecap="round"/>
  <line x1="205" y1="320" x2="215" y2="385" stroke="#1565C0" stroke-width="10" stroke-linecap="round"/>

  <!-- Tasse sur la table -->
  <rect x="280" y="282" width="18" height="18" rx="2" fill="white"/>
  <rect x="296" y="287" width="8" height="8" rx="4" fill="none" stroke="white" stroke-width="2"/>
  <!-- Vapeur -->
  <path d="M285,278 Q288,270 291,278" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <path d="M290,275 Q293,267 296,275" fill="none" stroke="#ccc" stroke-width="1.5"/>

  <!-- Panneau / ecriteau -->
  <rect x="310" y="240" width="240" height="70" rx="5" fill="white" stroke="#333" stroke-width="2"/>
  <!-- Pied du panneau -->
  <rect x="425" y="310" width="6" height="45" fill="#666"/>

  <!-- Texte sur le panneau -->
  <text x="430" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#333">Votre opinion ici</text>
  <text x="430" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">CHANGE MY MIND</text>

  <!-- Label du template -->
  <rect x="5" y="555" width="260" height="40" rx="8" fill="rgba(0,0,0,0.5)"/>
  <text x="135" y="581" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">CHANGE MY MIND MEME</text>
</svg>